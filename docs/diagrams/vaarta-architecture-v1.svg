<svg width="680" height="664" viewBox="0 0 680 664" xmlns="http://www.w3.org/2000/svg" role="img">
<title>VAARTA architecture — built vs. designed</title>
<desc>Structural diagram of the VAARTA Android app showing the data flow from call detection through the Tier-0 risk engine to complaint generation, with each module color-coded by build status: green for built and tested, amber for partially built, gray for not yet built or explicitly out of MVP scope.</desc>
<style>
  text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; fill: #5a5a5a; }
  .box { fill: #ffffff; stroke: #999; }
  .c-gray rect { fill: #F1EFE8; stroke: #888780; }
  .c-gray text.th { fill: #444441; }
  .c-gray text.ts { fill: #5F5E5A; }
  .c-green rect { fill: #EAF3DE; stroke: #639922; }
  .c-green text.th { fill: #27500A; }
  .c-green text.ts { fill: #3B6D11; }
  .c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
  .c-amber text.th { fill: #633806; }
  .c-amber text.ts { fill: #854F0B; }
  .arr { stroke: #999; stroke-width: 1.5; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="20" y="20" width="640" height="622" rx="20" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5 4"/>
<text class="th" x="40" y="46">VAARTA — Android app (on-device, $0 build)</text>
<text class="ts" x="40" y="64">Build status as of 2026-07-07 · ADR-0001 scope lock</text>

<!-- Row A: entry points -->
<g class="c-gray"><rect x="60" y="84" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="195" y="102" text-anchor="middle" dominant-baseline="central">Call detected</text>
<text class="ts" x="195" y="120" text-anchor="middle" dominant-baseline="central">core:call — not built yet</text></g>

<g class="c-green"><rect x="350" y="84" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="485" y="102" text-anchor="middle" dominant-baseline="central">Demo / manual trigger</text>
<text class="ts" x="485" y="120" text-anchor="middle" dominant-baseline="central">app — built, live-verified</text></g>

<!-- Row B: listen -->
<g class="c-gray"><rect x="60" y="168" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="195" y="186" text-anchor="middle" dominant-baseline="central">Audio capture + ASR</text>
<text class="ts" x="195" y="204" text-anchor="middle" dominant-baseline="central">core:audio, core:asr — not built</text></g>

<g class="c-green"><rect x="350" y="168" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="485" y="186" text-anchor="middle" dominant-baseline="central">Manual Mode (14 cues)</text>
<text class="ts" x="485" y="204" text-anchor="middle" dominant-baseline="central">app — built, tested live</text></g>

<!-- Row C: the brain -->
<g class="c-green"><rect x="140" y="252" width="400" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="270" text-anchor="middle" dominant-baseline="central">Tier-0 risk engine</text>
<text class="ts" x="340" y="288" text-anchor="middle" dominant-baseline="central">core:reasoning + pack — built, 13 tests</text></g>

<!-- Row D: risk UI -->
<g class="c-amber"><rect x="140" y="336" width="400" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="354" text-anchor="middle" dominant-baseline="central">Risk state UI</text>
<text class="ts" x="340" y="372" text-anchor="middle" dominant-baseline="central">app card built; overlay bubble not yet</text></g>

<!-- Row E: outputs -->
<g class="c-amber"><rect x="60" y="420" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="195" y="438" text-anchor="middle" dominant-baseline="central">Family alert</text>
<text class="ts" x="195" y="456" text-anchor="middle" dominant-baseline="central">share-intent built; picker missing</text></g>

<g class="c-amber"><rect x="350" y="420" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="485" y="438" text-anchor="middle" dominant-baseline="central">Complaint generator</text>
<text class="ts" x="485" y="456" text-anchor="middle" dominant-baseline="central">JSON/TXT built; PDF missing</text></g>

<text class="ts" x="60" y="508">Out of scope for this MVP (ADR-0001):</text>

<!-- Row F: deferred / out of scope -->
<g class="c-gray"><rect x="60" y="522" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="195" y="540" text-anchor="middle" dominant-baseline="central">Persistence</text>
<text class="ts" x="195" y="558" text-anchor="middle" dominant-baseline="central">core:data — not built (RAM-only)</text></g>

<g class="c-gray"><rect x="350" y="522" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="485" y="540" text-anchor="middle" dominant-baseline="central">Cloud LLM polish</text>
<text class="ts" x="485" y="558" text-anchor="middle" dominant-baseline="central">core:cloud — out of scope ($0 lock)</text></g>

<!-- Connectors -->
<line x1="195" y1="140" x2="195" y2="168" class="arr" marker-end="url(#arrow)"/>
<line x1="485" y1="140" x2="485" y2="168" class="arr" marker-end="url(#arrow)"/>

<path d="M195,224 L195,238 L300,238 L300,252" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M485,224 L485,238 L380,238 L380,252" fill="none" class="arr" marker-end="url(#arrow)"/>

<line x1="340" y1="308" x2="340" y2="336" class="arr" marker-end="url(#arrow)"/>

<path d="M340,392 L340,406 L195,406 L195,420" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M340,392 L340,406 L485,406 L485,420" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- Legend -->
<circle class="c-green" cx="70" cy="616" r="6" stroke-width="0.5"/>
<text class="ts" x="84" y="616" dominant-baseline="central">Built &amp; tested</text>
<circle class="c-amber" cx="230" cy="616" r="6" stroke-width="0.5"/>
<text class="ts" x="244" y="616" dominant-baseline="central">Partial</text>
<circle class="c-gray" cx="330" cy="616" r="6" stroke-width="0.5"/>
<text class="ts" x="344" y="616" dominant-baseline="central">Not built / deferred</text>
</svg>
