<svg width="980" height="1160" viewBox="0 0 980 1160" xmlns="http://www.w3.org/2000/svg" role="img">
<title>VAARTA — System Architecture</title>
<desc>VAARTA's on-device architecture: multiple call/message entry points feed a deterministic Tier-0 risk engine, which is the sole owner of the scam risk score; an AI copilot layered on top can only raise displayed concern, never lower or set the score, and every AI reply passes a safety filter before reaching the user. Protective actions (live coaching, guardian alert, complaint co-pilot, link checker) and encrypted on-device storage sit downstream. A language layer mirrors the user's script throughout.</desc>
<style>
  text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #1a1a1a; }
  .title { font-size: 20px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #5a5a5a; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 11.5px; fill: #4a4a4a; }
  .section { font-size: 12px; font-weight: 700; fill: #6a6a6a; letter-spacing: 0.04em; text-transform: uppercase; }
  .core rect { fill: #EEF0FC; stroke: #3F3FA8; stroke-width: 1.6; }
  .core text.th { fill: #24246B; }
  .ai rect { fill: #F5F0FB; stroke: #7A4FB0; stroke-width: 1.4; }
  .ai text.th { fill: #4E2E73; }
  .action rect { fill: #FFFFFF; stroke: #8A8FA8; stroke-width: 1.2; }
  .action text.th { fill: #24243A; }
  .store rect { fill: #EAF3EA; stroke: #4C8C57; stroke-width: 1.4; }
  .store text.th { fill: #285A31; }
  .external rect { fill: #FAFAFA; stroke: #A0A0A0; stroke-width: 1.2; stroke-dasharray: 4 3; }
  .external text.th { fill: #555; }
  .safety rect { fill: #FFF4E6; stroke: #B9701A; stroke-width: 1.4; }
  .safety text.th { fill: #6B3E0A; }
  .arr { stroke: #9A9AA5; stroke-width: 1.6; fill: none; }
  .arrThin { stroke: #B7B7C0; stroke-width: 1.3; fill: none; stroke-dasharray: 3 3; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#9A9AA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="14" y="14" width="952" height="1132" rx="18" fill="none" stroke="#D8D8DE" stroke-width="1"/>
<text class="title" x="36" y="46">VAARTA — System Architecture</text>
<text class="subtitle" x="36" y="66">Native Android · on-device-first · a deterministic engine owns the score, AI can only raise it</text>

<!-- Row 1: Entry points -->
<text class="section" x="36" y="98">Entry points</text>
<g class="action"><rect x="36" y="106" width="270" height="52" rx="8"/>
<text class="th" x="171" y="126" text-anchor="middle" dominant-baseline="central">Live call (speakerphone)</text>
<text class="ts" x="171" y="144" text-anchor="middle" dominant-baseline="central">mic capture, opt-in AI coach</text></g>

<g class="action"><rect x="355" y="106" width="270" height="52" rx="8"/>
<text class="th" x="490" y="126" text-anchor="middle" dominant-baseline="central">Recorded call / audio clip</text>
<text class="ts" x="490" y="144" text-anchor="middle" dominant-baseline="central">after-the-fact analysis</text></g>

<g class="action"><rect x="674" y="106" width="270" height="52" rx="8"/>
<text class="th" x="809" y="126" text-anchor="middle" dominant-baseline="central">Chat message / link</text>
<text class="ts" x="809" y="144" text-anchor="middle" dominant-baseline="central">"Ask VAARTA", scam-link check</text></g>

<!-- Row 2: Transcription / understanding -->
<g class="ai"><rect x="36" y="188" width="589" height="46" rx="8"/>
<text class="th" x="330" y="205" text-anchor="middle" dominant-baseline="central">Gemini Live — real-time transcription + tone understanding</text>
<text class="ts" x="330" y="222" text-anchor="middle" dominant-baseline="central">also used for recorded-clip transcription/classification</text></g>

<g class="action"><rect x="674" y="188" width="270" height="46" rx="8"/>
<text class="th" x="809" y="208" text-anchor="middle" dominant-baseline="central">Direct text</text>
<text class="ts" x="809" y="222" text-anchor="middle" dominant-baseline="central">typed / attached content</text></g>

<!-- Row 3: Core intelligence -->
<text class="section" x="36" y="266">Core intelligence</text>
<g class="core"><rect x="36" y="274" width="440" height="112" rx="10" stroke-width="2"/>
<text class="th" x="256" y="296" text-anchor="middle" dominant-baseline="central">Deterministic Risk Engine (Tier-0)</text>
<text class="ts" x="256" y="316" text-anchor="middle" dominant-baseline="central">24-signal intel pack · HOOK → AUTHORITY → ISOLATION →</text>
<text class="ts" x="256" y="332" text-anchor="middle" dominant-baseline="central">ESCALATION → EXTRACTION stage grammar · 0–100 score</text>
<text class="ts" x="256" y="352" text-anchor="middle" dominant-baseline="central" font-weight="700">The sole owner of the risk score — never an LLM</text></g>

<g class="ai"><rect x="504" y="274" width="440" height="112" rx="10" stroke-width="2"/>
<text class="th" x="724" y="296" text-anchor="middle" dominant-baseline="central">AI Copilot (Gemini)</text>
<text class="ts" x="724" y="316" text-anchor="middle" dominant-baseline="central">live coaching · web-grounded scam-ID with cited sources ·</text>
<text class="ts" x="724" y="332" text-anchor="middle" dominant-baseline="central">conversational "Ask VAARTA" · trending-scam feed</text>
<text class="ts" x="724" y="352" text-anchor="middle" dominant-baseline="central" font-weight="700">Advisory only — can raise displayed concern, never lower it</text></g>

<!-- Row 4: Safety rail -->
<g class="safety"><rect x="36" y="404" width="908" height="50" rx="8"/>
<text class="th" x="490" y="422" text-anchor="middle" dominant-baseline="central">Hybrid Alert + Suggestion Safety Filter</text>
<text class="ts" x="490" y="440" text-anchor="middle" dominant-baseline="central">deny-list rail on every AI reply (EN/Hindi/Devanagari) · fails closed to the deterministic engine on any AI error</text></g>

<!-- Row 5: user-facing surfaces -->
<text class="section" x="36" y="488">User-facing surfaces</text>
<g class="action"><rect x="36" y="496" width="286" height="60" rx="8"/>
<text class="th" x="179" y="516" text-anchor="middle" dominant-baseline="central">Live risk UI + floating overlay</text>
<text class="ts" x="179" y="536" text-anchor="middle" dominant-baseline="central">draggable in-call bubble/panel</text></g>

<g class="action"><rect x="347" y="496" width="286" height="60" rx="8"/>
<text class="th" x="490" y="516" text-anchor="middle" dominant-baseline="central">Verification questions</text>
<text class="ts" x="490" y="536" text-anchor="middle" dominant-baseline="central">"say this" coaching replies</text></g>

<g class="action"><rect x="658" y="496" width="286" height="60" rx="8"/>
<text class="th" x="801" y="516" text-anchor="middle" dominant-baseline="central">Trending scam feed + articles</text>
<text class="ts" x="801" y="536" text-anchor="middle" dominant-baseline="central">web-grounded, source-cited</text></g>

<!-- Row 6: protective actions -->
<text class="section" x="36" y="592">Protective actions</text>
<g class="action"><rect x="36" y="600" width="286" height="72" rx="8"/>
<text class="th" x="179" y="622" text-anchor="middle" dominant-baseline="central">Guardian alert</text>
<text class="ts" x="179" y="640" text-anchor="middle" dominant-baseline="central">warns a chosen contact directly —</text>
<text class="ts" x="179" y="656" text-anchor="middle" dominant-baseline="central">no SEND_SMS/READ_CONTACTS needed</text></g>

<g class="action"><rect x="347" y="600" width="286" height="72" rx="8"/>
<text class="th" x="490" y="616" text-anchor="middle" dominant-baseline="central">Complaint co-pilot</text>
<text class="ts" x="490" y="634" text-anchor="middle" dominant-baseline="central">routes + pre-fills the real NCRP/</text>
<text class="ts" x="490" y="650" text-anchor="middle" dominant-baseline="central">Chakshu portal — the user's own tap</text>
<text class="ts" x="490" y="664" text-anchor="middle" dominant-baseline="central" font-weight="700">is always the final Submit/OTP action</text></g>

<g class="action"><rect x="658" y="600" width="286" height="72" rx="8"/>
<text class="th" x="801" y="622" text-anchor="middle" dominant-baseline="central">Scam-link checker</text>
<text class="ts" x="801" y="640" text-anchor="middle" dominant-baseline="central">URLhaus + Google Safe Browsing</text>
<text class="ts" x="801" y="656" text-anchor="middle" dominant-baseline="central">fails closed, raise-only</text></g>

<!-- Row 7: storage -->
<text class="section" x="36" y="702">On-device storage</text>
<g class="store"><rect x="36" y="710" width="908" height="70" rx="10" stroke-width="2"/>
<text class="th" x="490" y="732" text-anchor="middle" dominant-baseline="central">Encrypted local storage — SQLCipher (Room)</text>
<text class="ts" x="490" y="752" text-anchor="middle" dominant-baseline="central">conversations · filing-details vault · guardian contact · voice sample — key wrapped by Android Keystore</text>
<text class="ts" x="490" y="768" text-anchor="middle" dominant-baseline="central" font-weight="700">Nothing leaves the device unless the user explicitly shares/exports it</text></g>

<!-- Row 8: language layer -->
<g class="ai"><rect x="36" y="800" width="908" height="42" rx="8"/>
<text class="th" x="490" y="821" text-anchor="middle" dominant-baseline="central">Language layer — हिन्दी + Hinglish UI, AI replies mirror the user's own script throughout</text></g>

<!-- Row 9: external systems -->
<text class="section" x="36" y="880">External systems (network calls only when the AI layer is opted in)</text>
<g class="external"><rect x="36" y="888" width="286" height="56" rx="8"/>
<text class="th" x="179" y="908" text-anchor="middle" dominant-baseline="central">Gemini API</text>
<text class="ts" x="179" y="926" text-anchor="middle" dominant-baseline="central">live audio, chat, grounding</text></g>

<g class="external"><rect x="347" y="888" width="286" height="56" rx="8"/>
<text class="th" x="490" y="908" text-anchor="middle" dominant-baseline="central">URLhaus + Safe Browsing</text>
<text class="ts" x="490" y="926" text-anchor="middle" dominant-baseline="central">URL reputation lookup only</text></g>

<g class="external"><rect x="658" y="888" width="286" height="56" rx="8"/>
<text class="th" x="801" y="908" text-anchor="middle" dominant-baseline="central">cybercrime.gov.in / Sanchar Saathi</text>
<text class="ts" x="801" y="926" text-anchor="middle" dominant-baseline="central">the real NCRP/Chakshu government portals</text></g>

<!-- Connectors: entries -> transcription/text -->
<line x1="171" y1="158" x2="171" y2="188" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="158" x2="490" y2="188" class="arr" marker-end="url(#arrow)"/>
<line x1="809" y1="158" x2="809" y2="188" class="arr" marker-end="url(#arrow)"/>

<!-- transcription/text -> core intelligence -->
<path d="M330,234 L330,250 L256,250 L256,274" class="arr" marker-end="url(#arrow)"/>
<path d="M330,234 L330,250 L724,250 L724,274" class="arr" marker-end="url(#arrow)"/>
<path d="M809,234 L809,250 L724,250" class="arr" marker-end="url(#arrow)"/>

<!-- core intelligence -> safety rail -->
<line x1="256" y1="386" x2="256" y2="404" class="arr" marker-end="url(#arrow)"/>
<line x1="724" y1="386" x2="724" y2="404" class="arr" marker-end="url(#arrow)"/>

<!-- safety rail -> user-facing surfaces -->
<path d="M490,454 L490,470 L179,470 L179,496" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="454" x2="490" y2="496" class="arr" marker-end="url(#arrow)"/>
<path d="M490,454 L490,470 L801,470 L801,496" class="arr" marker-end="url(#arrow)"/>

<!-- user-facing surfaces -> protective actions -->
<line x1="179" y1="556" x2="179" y2="600" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="556" x2="490" y2="600" class="arr" marker-end="url(#arrow)"/>
<path d="M801,556 L801,576 L801,600" class="arr" marker-end="url(#arrow)"/>

<!-- protective actions -> storage -->
<path d="M179,672 L179,690 L490,690 L490,710" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="672" x2="490" y2="710" class="arr" marker-end="url(#arrow)"/>

<!-- AI copilot / link checker -> external (dashed, opt-in) -->
<path d="M724,386 L724,860 L179,860 L179,888" class="arrThin"/>
<path d="M801,672 L801,888" class="arrThin"/>
<path d="M490,672 L490,760 L801,760 L801,844 L801,888" class="arrThin"/>

<!-- Legend -->
<g class="core"><rect x="36" y="1078" width="16" height="16" rx="3"/></g>
<text class="ts" x="60" y="1090">Deterministic (never an LLM)</text>
<g class="ai"><rect x="256" y="1078" width="16" height="16" rx="3"/></g>
<text class="ts" x="280" y="1090">AI / advisory (raise-only)</text>
<g class="safety"><rect x="446" y="1078" width="16" height="16" rx="3"/></g>
<text class="ts" x="470" y="1090">Safety rail</text>
<g class="store"><rect x="562" y="1078" width="16" height="16" rx="3"/></g>
<text class="ts" x="586" y="1090">Encrypted storage</text>
<g class="external"><rect x="716" y="1078" width="16" height="16" rx="3"/></g>
<text class="ts" x="740" y="1090">External (opt-in only)</text>

<text class="ts" x="36" y="1118">Digital Public Safety hackathon submission (Requirement 6) — VAARTA focuses deeply on digital-arrest scam detection, citizen protection, and auditable complaint filing.</text>
</svg>
